<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提交刀具 · KNIFE WORLD</title>
  </head>
  <body>
    <main class="submit-shell">
      <nav><a href="./">← 返回星图</a><span>PUBLIC SUBMISSION</span></nav>
      <form id="knife-form" class="submit-card">
        <p class="eyebrow">KNIFE WORLD · OPEN ATLAS</p>
        <h1>刀具说明卡</h1>
        <p class="intro">无需登录，提交后直接进入公开星图。沿标注线填写对应规格，长度使用毫米，重量使用克。</p>

        <div class="identity-fields">
          <label>品牌 *<select name="brand" required><option value="">选择品牌</option><option>Benchmade</option><option>Spyderco</option><option>Victorinox</option><option>Kizer</option><option>CIVIVI</option><option>WE Knife</option><option>三刃木</option><option>其他</option></select></label>
          <label id="other-brand-field" hidden>其他品牌<input name="other_brand" maxlength="120" /></label>
          <label>型号 *<input name="model" maxlength="120" required placeholder="例如 940 Osborne" /></label>
          <label>产地<input name="origin" maxlength="120" placeholder="选填" /></label>
        </div>

        <section class="spec-card" aria-label="刀具规格标注图">
          <svg class="knife-drawing" viewBox="0 0 430 780" role="img" aria-label="竖直展开的漫画风折刀">
            <defs>
              <pattern id="comicDots" width="10" height="10" patternUnits="userSpaceOnUse"><circle cx="3" cy="3" r="2" fill="#72d6f2" opacity=".28"/></pattern>
              <pattern id="comicHatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(28)"><line x1="0" y1="0" x2="0" y2="12" stroke="#9de7fa" stroke-width="3" opacity=".16"/></pattern>
              <filter id="comicShadow"><feDropShadow dx="9" dy="10" stdDeviation="0" flood-color="#000" flood-opacity=".65"/></filter>
            </defs>
            <g class="motion-lines"><path d="M74 108 L30 70"/><path d="M86 82 L65 28"/><path d="M112 74 L108 18"/><path d="M278 654 L328 687"/><path d="M265 680 L300 733"/></g>
            <path class="blade-shape" filter="url(#comicShadow)" d="M214 45 C164 114 123 228 120 344 C119 386 141 416 185 431 L243 421 L268 357 L260 106 Z"/>
            <path class="blade-tone" d="M214 45 C188 139 173 260 185 431 L243 421 L268 357 L260 106 Z"/>
            <path class="blade-edge" d="M214 45 C164 114 123 228 120 344 C119 386 141 416 185 431"/>
            <path class="handle-shape" filter="url(#comicShadow)" d="M169 407 C134 459 123 581 151 711 C157 742 187 760 215 741 C267 704 292 571 263 439 C256 407 203 389 169 407 Z"/>
            <path class="handle-inset" d="M181 445 C159 502 158 613 177 691 C181 707 197 716 210 703 C241 671 257 555 238 467 C233 444 198 427 181 445 Z"/>
            <circle class="pivot" cx="214" cy="433" r="30"/><circle class="pivot-core" cx="214" cy="433" r="8"/>
            <path class="clip" d="M246 483 C275 535 265 638 225 687"/>
            <text class="comic-word" x="36" y="210">SLICE!</text>
            <g class="callout-lines"><path d="M205 72 L330 72"/><path d="M130 257 L330 150"/><path d="M178 347 L330 230"/><path d="M250 462 L330 310"/><path d="M254 535 L330 390"/><path d="M185 582 L330 470"/><path d="M210 433 L330 550"/><path d="M193 717 L330 630"/></g>
            <g class="anchor-dots"><circle cx="205" cy="72" r="5"/><circle cx="130" cy="257" r="5"/><circle cx="178" cy="347" r="5"/><circle cx="250" cy="462" r="5"/><circle cx="254" cy="535" r="5"/><circle cx="185" cy="582" r="5"/><circle cx="210" cy="433" r="5"/><circle cx="193" cy="717" r="5"/></g>
          </svg>
          <label class="callout c-overall"><b>全长 <span>mm</span></b><input name="overall_length_mm" type="number" min="0" step="0.1" /></label>
          <label class="callout c-blade-length"><b>刀刃长度 <span>mm</span></b><input name="blade_length_mm" type="number" min="0" step="0.1" /></label>
          <label class="callout c-blade-material"><b>刀刃材质</b><input name="blade_material" maxlength="120" /></label>
          <label class="callout c-handle-length"><b>刀柄长度 <span>mm</span></b><input name="handle_length_mm" type="number" min="0" step="0.1" /></label>
          <label class="callout c-handle-material"><b>刀柄材质</b><input name="handle_material" maxlength="120" /></label>
          <label class="callout c-thickness"><b>刀柄厚度 <span>mm</span></b><input name="handle_thickness_mm" type="number" min="0" step="0.1" /></label>
          <label class="callout c-lock"><b>锁定方式</b><input name="lock" maxlength="120" /></label>
          <label class="callout c-weight"><b>整体重量 <span>g</span></b><input name="weight_g" type="number" min="0" step="0.1" /></label>
        </section>

        <details class="extra-fields"><summary>＋ 补充介绍与资料来源</summary><div class="notes-grid">
          <label>中文介绍<textarea name="description_zh" maxlength="5000"></textarea></label>
          <label>资料来源<input name="sources" placeholder="多个 URL 用逗号分隔" /></label>
        </div></details>

        <label class="confirm"><input name="confirm" type="checkbox" required /> 我确认提交的信息不包含隐私数据，并同意立即公开展示。</label>
        <button id="submit-button" type="submit">提交到公开星图</button>
        <p id="status" role="status"></p>
      </form>
    </main>
    <script type="module" src="/src/submit.js"></script>
  </body>
</html>
